name: Next.js Build Check

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16.2.3        
          cache: 'npm'              

      - name: Install dependencies
        run: npm ci                 

      - name: Run build
        run: npm run build
